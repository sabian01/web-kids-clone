<!DOCTYPE html>
<html>
    <head>
        <title></title>

        <!--Iportimi i fonteve te reja-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <style>
            body {
                margin: 0;
                
            }

            p {
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                cursor: pointer;
            }

            .delivery-truck-icon{
                width: 40px;
            }

            .free-shipping-text{
                color: rgb(173, 255, 162);
                font-weight: bold;
            }

            .free-shipping-text:hover {
                text-decoration: underline;
            }

            .incredible-text{
                color: rgb(173, 255, 162);
            }

            .return-text {
                color: #FFF7A7;
                font-weight: bold;
            }

            .return-text:hover{
                text-decoration: underline;
            }

            .purchase-date-text {
                color: #FFF7A7;
            }

            .header {
                display: flex;
                align-items: center;
                background-color: black;
                padding: 20px;
            }

            .icon-box {
                display: flex;
            }
            
            .icon-container {
                display: flex;
                align-items: center;
                padding-left: 5px;
                padding-right: 5px;
            }

            .icon-container img {
                width: 30px;
            }

            .text-container {
                display: flex;
                flex-direction: column;
                justify-content: start;
            }

            .text-container p {
                margin: 0;
            }

            .star {
                width: 20px;
            }

            .reviews-container{
                display: flex;
                align-items: center;
                font-family: Arial, Helvetica, sans-serif;
                font-size: 14px;
                color: gray;
            }

            .product-card{
                max-width: 300px;
            }

            .product-img{
                width: 100%;
            }




        </style>
    </head>

    <body>

        <div class="header">
            <div style="flex: 1; display: flex; justify-content: center; border-right: solid white 2px;">
                <!--Icon Box Compoment-->
                <div class="icon-box">
                    <div class="icon-container">
                        <img src="delivery-truck.png" class="delivery-truck-icon">
                    </div>
                    <div class="text-container">
                        <p class="free-shipping-text">Free shipping</p>
                        <p class="incredible-text">Incredible</p>
                    </div>
                   
                </div>
                <!--End Icon Box-->

            </div>

            <div style="flex: 1; display: flex; justify-content: center; border-right: solid white 2px;">

                 <!--Icon Box Compoment-->
                <div class="icon-box">
                    <div class="icon-container">
                        <img src="return.png" class="delivery-truck-icon">
                    </div>
                    <div class="text-container">
                        <p class="return-text">Return within 90d</p>
                        <p class="purchase-date-text">From purchase date</p>
                    </div>
                   
                </div>
                <!--End Icon Box-->
            
            </div>


            <div style="flex: 1; display: flex; justify-content: center;">
                 <!--Icon Box Compoment-->
                <div class="icon-box">
                    <div class="icon-container">
                       <img src="iphone.png" class="delivery-truck-icon">
                    </div>
                    <div class="text-container">
                        <p class="return-text">Get the temu app</p>
                    </div>
                   
                </div>
                <!--End Icon Box-->

                

            </div>

        </div>

        <!--Block Elements:
        Block elements e marin te gjithe rreshtin per vete.
        -->

        <!--Inline Block Element:
        Marin aq hapesire sa u nevojitet.
        -->


        <div class="product-card">
            <div>
                <img src="temu-product01.avif" class="product-img">
            
            </div>

            <div>
                <div>
                    <p>312L <span>57K+ sold</span></p>
                </div>

                <div class="reviews-container">
                    <img src="star.svg" class="star">
                    <img src="star.svg" class="star">
                    <img src="star.svg" class="star">
                    <img src="star.svg" class="star">
                    <img src="star.svg" class="star">
                    2,295
                </div>
            </div>
        </div>




    </body>

</html>
